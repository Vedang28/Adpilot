services:
  postgres:
    image: postgres:16-alpine
    container_name: adpilot-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: adpilot
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: adpilot-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  maxleads-nginx:
    image: nginx:alpine
    container_name: maxleads-nginx
    volumes:
      - ./maxleads/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./maxleads:/usr/share/nginx/html
    expose:
      - "80"
    networks:
      - internal

  highway-app:
    build: ./src
    container_name: highway-app
    expose:
      - "4000"
    ports:
      - "3000:3000"
    networks:
      - internal

  caddy:
    image: caddy:latest
    container_name: caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - maxleads-nginx
      - highway-app
    networks:
      - internal

networks:
  internal:

volumes:
  pgdata:
  redisdata:
  caddy_data:
  caddy_config:
